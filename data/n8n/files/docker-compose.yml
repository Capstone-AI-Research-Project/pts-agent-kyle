services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-4}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_FLASH_ATTN=1
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-16}
    ports:
      - ${LLAMA_PORT:-11434}:11434
    volumes:
      - ollama:/root/.ollama
      - ./modelfiles:/modelfiles:ro
    container_name: ollama
    tty: true
    networks:
      - n8n-network
      - ollama-network
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OWUI_PORT:-3000}:8080
    environment:
      - "OLLAMA_BASE_URL=http://ollama:11434"
      - "WEBUI_SECRET_KEY="
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - ollama-network
      - n8n-network
    restart: unless-stopped

  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: postgres_16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npass}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    # For production, set REDIS_PASSWORD in .env and use:
    # command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network
    restart: unless-stopped

  n8n-main:
    build:
      context: .
      dockerfile_inline: |
        FROM alpine:3.20 AS apkstage
        RUN apk add --no-cache apk-tools-static
        FROM n8nio/n8n:latest
        USER root
        COPY --from=apkstage /sbin/apk.static /sbin/apk.static
        RUN mkdir -p /etc/apk && \
            echo "http://dl-cdn.alpinelinux.org/alpine/latest-stable/main" > /etc/apk/repositories && \
            echo "http://dl-cdn.alpinelinux.org/alpine/latest-stable/community" >> /etc/apk/repositories && \
            /sbin/apk.static -U --allow-untrusted --no-cache add unzip zip
        USER node
    image: n8n-local:latest-unzip
    pull_policy: never
    container_name: n8n-main
    restart: always
    ports:
      - ${N8N_PORT:-5678}:5678
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Phoenix}
      - TZ=${GENERIC_TIMEZONE:-America/Phoenix}
      # Postgres settings
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-db
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Basic settings
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASS}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_HOST=${N8N_HOSTNAME:-localhost}
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_AUTH_TOKEN}
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_NATIVE_PYTHON_RUNNER=true
      - WEBHOOK_URL=${N8N_HOSTNAME:+https://}${N8N_HOSTNAME:-http://localhost:5678}/
      - WEBHOOK_TUNNEL_URL=http://localhost:5678
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - EXECUTIONS_TIMEOUT=${EXECUTIONS_TIMEOUT:-2400}
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_RUNNERS_ENABLED_TASK_TYPES=javascript,python
      - NODES_EXCLUDE=[]
      - N8N_SKIP_AUTH_ON_OAUTH_CALLBACK=true
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/
      - N8N_WORKFLOW_EXPORT_DIR=/home/node/.n8n/workflows
      # Redis (queue)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_DB=${REDIS_DB:-0}
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./assets:/home/node/assets
      - ./data/n8n/files:/home/node/.n8n/files
      - ./workflows:/home/node/.n8n/workflows
      - ./logs:/home/node/.n8n/logs
      - ./scripts:/home/node/scripts
      - ./output:/home/node/output
    networks:
      - n8n-network
      - ollama-network

  n8n-config-patcher:
    image: n8nio/runners:latest
    container_name: n8n-config-patcher
    restart: "no"
    user: root
    entrypoint: /bin/sh
    volumes:
      - /home/n8n-data/n8n-config:/host-config
    command: >
      -c "
      set -e;
      cp -f /etc/n8n-task-runners.json /host-config/n8n-task-runners.json;
      sed -i '/\"runner-type\": \"javascript\"/,/\"allowed-env\": \\[/ s/\"allowed-env\": \\[/\"allowed-env\": [\"NODE_FUNCTION_ALLOW_BUILTIN\",\"NODE_FUNCTION_ALLOW_EXTERNAL\",/g' /host-config/n8n-task-runners.json;
      sed -i 's/\"NODE_FUNCTION_ALLOW_BUILTIN\": *\"[^\"]*\"/\"NODE_FUNCTION_ALLOW_BUILTIN\": \"path,fs\"/g' /host-config/n8n-task-runners.json;
      sed -i 's/\"NODE_FUNCTION_ALLOW_EXTERNAL\": *\"[^\"]*\"/\"NODE_FUNCTION_ALLOW_EXTERNAL\": \"*\"/g' /host-config/n8n-task-runners.json;
      sed -i '/\"runner-type\": \"python\"/,/\"allowed-env\": \\[/ s/\"allowed-env\": \\[/\"allowed-env\": [\"N8N_RUNNERS_STDLIB_ALLOW\",\"N8N_RUNNERS_EXTERNAL_ALLOW\",\"PYTHONPATH\",/g' /host-config/n8n-task-runners.json;
      sed -i 's/\"N8N_RUNNERS_STDLIB_ALLOW\": *\"[^\"]*\"/\"N8N_RUNNERS_STDLIB_ALLOW\": \"os,pathlib\"/g' /host-config/n8n-task-runners.json;
      sed -i 's/\"N8N_RUNNERS_EXTERNAL_ALLOW\": *\"[^\"]*\"/\"N8N_RUNNERS_EXTERNAL_ALLOW\": \"*\"/g' /host-config/n8n-task-runners.json;
      chmod 644 /host-config/n8n-task-runners.json;
      echo 'Patched runners config';
      "
    networks:
      - n8n-network

  n8n-runners:
    build:
      context: .
      dockerfile: Dockerfile.runners
    container_name: n8n-runners
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-main:5679
      - N8N_RUNNERS_ENABLED_TASK_TYPES=javascript,python
      - N8N_RUNNERS_MAX_CONCURRENCY=10
      - NODE_FUNCTION_ALLOW_BUILTIN=path,fs
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_RUNNERS_STDLIB_ALLOW=os,pathlib
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - PYTHONPATH=/opt/runners/task-runner-python
    volumes:
      - ./n8n-config/n8n-task-runners.json:/etc/n8n-task-runners.json:ro
      - ./assets:/home/node/assets:ro
    networks:
      - n8n-network
    depends_on:
      n8n-config-patcher:
        condition: service_completed_successfully
      n8n-main:
        condition: service_started

networks:
  n8n-network:
    driver: bridge
  ollama-network:
    driver: bridge

volumes:
  ollama: {}
  open-webui: {}
  postgres_data: {}
  redis_data: {}
  n8n_data: {}
